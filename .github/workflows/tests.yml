name: Teste

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
      - name: Ia codul
        uses: actions/checkout@v4

      - name: Pregătește Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalează dependențele
        run: pip install -r requirements-dev.txt

      - name: Rulează testele
        run: pytest -v

  test-js:
    runs-on: ubuntu-latest
    steps:
      - name: Ia codul
        uses: actions/checkout@v4

      - name: Pregătește Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalează dependențele
        run: npm ci

      - name: Rulează testele
        run: npm test
